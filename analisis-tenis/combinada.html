<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Analizador de combinadas de apuestas de tenis — investigación real por cada pata (H2H, forma, lesiones, noticias) y probabilidad combinada estimada." />
  <title>Análisis Tenis — Analizador de Combinadas</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎾</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ─── Header ─── -->
  <header class="header">
    <span class="header-ball" aria-hidden="true">🔎</span>
    <h1>Analizador de <span>Combinadas</span></h1>
    <div class="header-meta">
      <span class="header-date" id="display-date">Cargando…</span>
      <span class="header-badge live" id="bookmaker-badge">Cargando…</span>
    </div>
    <nav class="page-nav">
      <a href="index.html">← Volver a partidos del día</a>
    </nav>
  </header>

  <!-- ─── Main ─── -->
  <main class="main">

    <!-- Slip summary -->
    <div class="slip-summary" id="slip-summary">
      <div class="no-matches">
        <div class="no-matches-icon">⏳</div>
        <h3>Cargando combinada…</h3>
      </div>
    </div>

    <!-- Section header -->
    <div class="section-header">
      <span class="section-label">Patas de la combinada</span>
      <span class="section-count" id="leg-count">—</span>
    </div>

    <!-- Legs -->
    <div class="matches-grid" id="legs-container" role="list" aria-live="polite"></div>

    <!-- Sources -->
    <div class="sources-section" id="sources-section"></div>

  </main>

  <!-- ─── Footer ─── -->
  <footer class="footer">
    <p>
      Análisis Tenis — Analizador de Combinadas &nbsp;·&nbsp;
      Investigación basada en fuentes públicas (ATP Tour, modelos predictivos y medios especializados)
    </p>
    <p style="margin-top:6px;color:var(--text-muted)" id="disclaimer-text"></p>
  </footer>

  <script src="combinada.js"></script>
</body>
</html>
