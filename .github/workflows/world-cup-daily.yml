name: World Cup Daily Update

on:
  schedule:
    # Runs at 06:00 UTC every day during the World Cup (June 11 – July 19, 2026)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD). Defaults to today.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  deploy:
    name: Update data and deploy to gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine target date
        id: date
        run: |
          TARGET="${{ github.event.inputs.target_date }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(date -u +%Y-%m-%d)
          fi
          echo "date=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Target date: $TARGET"

      - name: Update today marker in fixtures
        run: |
          TARGET="${{ steps.date.outputs.date }}"
          echo "Updating predictor data for $TARGET"
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('world-cup-predictor/data/fixtures_2026.json', 'utf8'));
            data._generated = { date: '$TARGET', timestamp: new Date().toISOString() };
            fs.writeFileSync('world-cup-predictor/data/fixtures_2026.json', JSON.stringify(data, null, 2));
            const matches = data.matches.filter(m => m.date === '$TARGET');
            console.log(\`Found \${matches.length} match(es) for $TARGET\`);
          "

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add world-cup-predictor/data/fixtures_2026.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update predictor data for ${{ steps.date.outputs.date }}"
            git push origin HEAD:main
          fi

      - name: Deploy to gh-pages branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copy the predictor files to a temp dir
          cp -r world-cup-predictor /tmp/predictor-dist

          # Switch to gh-pages branch (create if needed)
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Clear everything and copy fresh build
          git rm -rf . --quiet 2>/dev/null || true
          cp -r /tmp/predictor-dist/. .

          # Commit and push
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to deploy."
          else
            git commit -m "deploy: update predictor for ${{ steps.date.outputs.date }}"
            git push origin gh-pages
          fi
